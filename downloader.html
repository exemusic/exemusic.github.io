<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<title>ExeMusic Downloader</title>
<style>
    body {
        background: #0f172a;
        color: white;
        font-family: Arial, sans-serif;
        text-align: center;
        padding: 50px;
    }

    .box {
        background: #1e293b;
        padding: 30px;
        border-radius: 15px;
        width: 350px;
        margin: auto;
        box-shadow: 0 0 20px rgba(0,0,0,0.5);
    }

    input {
        width: 100%;
        padding: 10px;
        border-radius: 10px;
        border: none;
        margin-bottom: 15px;
    }

    button {
        background: #22c55e;
        border: none;
        padding: 10px 20px;
        border-radius: 10px;
        color: white;
        cursor: pointer;
        font-weight: bold;
    }

    .progress-container {
        margin-top: 20px;
        background: #334155;
        border-radius: 10px;
        overflow: hidden;
        height: 20px;
    }

    .progress-bar {
        height: 100%;
        width: 0%;
        background: #22c55e;
        transition: width 0.2s;
    }

    .status {
        margin-top: 10px;
        font-size: 14px;
        color: #94a3b8;
    }
</style>
</head>
<body>

<div class="box">
    <h2>ExeMusic Downloader</h2>
    
    <input type="text" id="url" placeholder="Paste link mp3 / top4top...">
    
    <button onclick="downloadFile()">Download</button>

    <div class="progress-container">
        <div class="progress-bar" id="progress"></div>
    </div>

    <div class="status" id="status">Menunggu...</div>
</div>

<script>
async function downloadFile() {
    const url = document.getElementById("url").value;
    const progressBar = document.getElementById("progress");
    const status = document.getElementById("status");

    if (!url) {
        alert("Masukkan link dulu!");
        return;
    }

    try {
        status.innerText = "Menghubungkan...";
        progressBar.style.width = "0%";

        const response = await fetch(url);

        if (!response.ok) throw new Error("Gagal download");

        const contentLength = response.headers.get('content-length');
        const total = contentLength ? parseInt(contentLength) : 0;

        const reader = response.body.getReader();
        let received = 0;
        let chunks = [];

        while(true) {
            const {done, value} = await reader.read();
            if (done) break;

            chunks.push(value);
            received += value.length;

            if (total) {
                let percent = (received / total) * 100;
                progressBar.style.width = percent + "%";
                status.innerText = "Downloading " + percent.toFixed(0) + "%";
            } else {
                status.innerText = "Downloading...";
            }
        }

        let blob = new Blob(chunks);
        let downloadUrl = URL.createObjectURL(blob);

        let a = document.createElement("a");
        a.href = downloadUrl;
        a.download = "music.mp3";
        a.click();

        status.innerText = "Selesai ✅";
        progressBar.style.width = "100%";

    } catch (err) {
        status.innerText = "Error ❌ (CORS / link tidak support)";
        console.error(err);
    }
}
</script>

</body>
</html>
