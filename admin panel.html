<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Admin Panel - Chika Birthday</title>
<meta name="theme-color" content="#ff6cab">
<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:Inter,Arial,sans-serif}
body{min-height:100vh;background:linear-gradient(135deg,#1a0f2e,#16213e);color:#fff;overflow-x:hidden}
.login-screen{position:fixed;inset:0;display:flex;align-items:center;justify-content:center;background:rgba(0,0,0,0.8);z-index:9999}
.login-panel{background:#1a0f2e;border:2px solid #ff6cab;border-radius:20px;padding:40px;width:min(400px,100%);box-shadow:0 20px 60px rgba(255,107,162,0.3)}
.login-panel h1{text-align:center;margin-bottom:30px;color:#ff6cab;font-size:28px}
.login-panel p{text-align:center;margin-bottom:20px;color:#888;font-size:14px}
.login-panel input{width:100%;padding:14px;border:2px solid #ff6cab;border-radius:10px;margin:12px 0;background:#0f0819;color:#fff;font-size:14px}
.login-panel input::placeholder{color:#888}
.login-btn{width:100%;padding:14px;border:none;border-radius:10px;background:linear-gradient(135deg,#ff83bc,#ff5fa2);color:#fff;font-weight:700;cursor:pointer;font-size:16px;transition:0.3s}
.login-btn:hover{transform:translateY(-2px);box-shadow:0 10px 30px rgba(255,107,162,0.4)}
.login-btn:disabled{opacity:0.5;cursor:not-allowed}
.error-msg{color:#ff4444;font-size:12px;margin-top:10px;text-align:center}
.success-msg{color:#44ff44;font-size:12px;margin-top:10px;text-align:center}

.admin-wrap{max-width:1200px;margin:auto;padding:20px}
.admin-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:40px;padding-bottom:20px;border-bottom:2px solid #ff6cab}
.admin-header h1{color:#ff6cab;font-size:32px}
.logout-btn{padding:10px 20px;background:#ff6cab;color:#1a0f2e;border:none;border-radius:8px;font-weight:700;cursor:pointer;transition:0.3s}
.logout-btn:hover{background:#ff5fa2}

.grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(350px,1fr));gap:20px;margin-bottom:40px}
.card{background:#16213e;border:2px solid #ff6cab;border-radius:15px;padding:25px}
.card h2{color:#ff6cab;margin-bottom:15px;font-size:20px;border-bottom:2px solid #ff6cab;padding-bottom:10px}

.wish-form input{width:100%;padding:12px;border:2px solid #ff6cab;border-radius:8px;margin:10px 0;background:#0f0819;color:#fff}
.wish-form button{width:100%;padding:12px;background:linear-gradient(135deg,#ff83bc,#ff5fa2);border:none;border-radius:8px;color:#fff;font-weight:700;cursor:pointer;margin-top:10px;transition:0.3s}
.wish-form button:hover{transform:translateY(-2px);box-shadow:0 10px 20px rgba(255,107,162,0.3)}

.broadcast-form{display:flex;flex-direction:column}
.broadcast-input{width:100%;padding:15px;border:2px solid #ff6cab;border-radius:8px;background:#0f0819;color:#fff;font-size:14px;resize:vertical;min-height:100px;font-family:Arial,sans-serif}
.broadcast-btn{width:100%;padding:12px;background:linear-gradient(135deg,#ff83bc,#ff5fa2);border:none;border-radius:8px;color:#fff;font-weight:700;cursor:pointer;margin-top:10px;transition:0.3s}
.broadcast-btn:hover{transform:translateY(-2px);box-shadow:0 10px 20px rgba(255,107,162,0.3)}
.broadcast-btn:disabled{opacity:0.5;cursor:not-allowed}

.stats{display:grid;grid-template-columns:repeat(2,1fr);gap:10px;margin-bottom:20px}
.stat-box{background:#0f0819;padding:15px;border-radius:10px;border-left:4px solid #ff6cab;text-align:center}
.stat-box .number{font-size:28px;font-weight:700;color:#ff6cab}
.stat-box .label{font-size:12px;color:#888;margin-top:5px}

.broadcast-feed{background:#0f0819;border:2px solid #ff6cab;border-radius:15px;padding:20px;max-height:400px;overflow-y:auto}
.broadcast-msg{background:rgba(255,107,162,0.1);border-left:4px solid #ff6cab;padding:15px;margin-bottom:10px;border-radius:8px;animation:slideIn 0.3s ease}
.broadcast-msg .sender{color:#ff6cab;font-weight:700;font-size:16px;margin-bottom:5px}
.broadcast-msg .content{color:#fff;word-wrap:break-word;line-height:1.5}
.broadcast-msg .time{color:#888;font-size:11px;margin-top:8px}

@keyframes slideIn{
  from{transform:translateX(-20px);opacity:0}
  to{transform:translateX(0);opacity:1}
}

.hidden{display:none}
::-webkit-scrollbar{width:8px}
::-webkit-scrollbar-track{background:#16213e}
::-webkit-scrollbar-thumb{background:#ff6cab;border-radius:4px}
::-webkit-scrollbar-thumb:hover{background:#ff5fa2}
</style>
</head>
<body>

<div class="login-screen" id="loginScreen">
 <div class="login-panel">
  <h1>Admin Panel</h1>
  <p style="text-align:center;color:#888;margin-bottom:20px">Login dengan Gmail kamu</p>
  <button class="login-btn" id="loginBtn" style="background:linear-gradient(135deg,#4285f4,#357ae8);margin-bottom:10px">
    🔵 Login dengan Google
  </button>
  <div id="loginMsg"></div>
 </div>
</div>

<div class="admin-wrap hidden" id="adminPanel">
 <div class="admin-header">
  <h1>🎀 Admin Panel - Chika Birthday</h1>
  <button class="logout-btn" id="logoutBtn">Logout</button>
 </div>

 <div class="grid">
  <!-- Card: Add Wishes -->
  <div class="card">
   <h2>➕ Tambah Wishes</h2>
   <div class="wish-form">
    <input type="text" id="wishName" placeholder="Nama pengucap" maxlength="30">
    <button id="addWishBtn">Tambah Wishes</button>
   </div>
   <div class="stats" style="margin-top:20px">
    <div class="stat-box">
     <div class="number" id="totalWishes">0</div>
     <div class="label">Total Wishes</div>
    </div>
    <div class="stat-box">
     <div class="number" id="totalBroadcast">0</div>
     <div class="label">Broadcast</div>
    </div>
   </div>
  </div>

  <!-- Card: Broadcast Message -->
  <div class="card">
   <h2>📢 Broadcast Announcement</h2>
   <div class="broadcast-form">
    <textarea class="broadcast-input" id="broadcastInput" placeholder="Tulis announcement di sini..."></textarea>
    <button class="broadcast-btn" id="sendBroadcastBtn">Kirim Broadcast</button>
   </div>
  </div>
 </div>

 <!-- Broadcast Feed -->
 <div class="card" style="grid-column:1/-1">
  <h2>📺 Live Broadcast Feed</h2>
  <div class="broadcast-feed" id="broadcastFeed"></div>
 </div>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/12.0.0/firebase-app.js";
import { getDatabase, ref, push, onValue, query, orderByChild, limitToLast, set } from "https://www.gstatic.com/firebasejs/12.0.0/firebase-database.js";
import { getAuth, signOut, onAuthStateChanged, signInWithPopup, GoogleAuthProvider } from "https://www.gstatic.com/firebasejs/12.0.0/firebase-auth.js";

const firebaseConfig={
 apiKey:"AIzaSyDtt4EGfBSK8SbLbiGKnsMlSgUW7fuKN8I",
 authDomain:"countdown-52c81.firebaseapp.com",
 projectId:"countdown-52c81",
 storageBucket:"countdown-52c81.firebasestorage.app",
 messagingSenderId:"121072761781",
 appId:"1:121072761781:web:5d8092a2795d50869b37fc",
 measurementId:"G-FCR7ZQKPPJ",
 databaseURL:"https://countdown-52c81-default-rtdb.asia-southeast1.firebasedatabase.app"
};

const app=initializeApp(firebaseConfig);
const db=getDatabase(app);
const auth=getAuth(app);
const ADMIN_EMAIL = "nairicintia@gmail.com";

const loginScreen = document.getElementById("loginScreen");
const adminPanel = document.getElementById("adminPanel");
const loginBtn = document.getElementById("loginBtn");
const loginMsg = document.getElementById("loginMsg");
const logoutBtn = document.getElementById("logoutBtn");
const wishName = document.getElementById("wishName");
const addWishBtn = document.getElementById("addWishBtn");
const broadcastInput = document.getElementById("broadcastInput");
const sendBroadcastBtn = document.getElementById("sendBroadcastBtn");
const broadcastFeed = document.getElementById("broadcastFeed");
const totalWishes = document.getElementById("totalWishes");
const totalBroadcast = document.getElementById("totalBroadcast");

let currentUser = null;

async function logAccessAttempt(email, allowed) {
 try {
   await push(ref(db, "admin_access_logs"), {
     email: email,
     timestamp: Date.now(),
     allowed: allowed
   });
 } catch (err) {
   console.error("Failed to log access:", err);
 }
}

function updateStats() {
 onValue(ref(db, "wishes"), snap => {
   const count = Object.keys(snap.val() || {}).length;
   totalWishes.textContent = count;
 });
 
 onValue(ref(db, "broadcasts"), snap => {
   const count = Object.keys(snap.val() || {}).length;
   totalBroadcast.textContent = count;
 });
}

function loadBroadcasts() {
 const q = query(ref(db, "broadcasts"), orderByChild("timestamp"), limitToLast(50));
 onValue(q, snap => {
   const data = snap.val() || {};
   broadcastFeed.innerHTML = "";
   
   const broadcasts = Object.values(data).reverse();
   broadcasts.forEach(msg => {
     const msgEl = document.createElement("div");
     msgEl.className = "broadcast-msg";
     const time = new Date(msg.timestamp).toLocaleTimeString("id-ID");
     msgEl.innerHTML = `
       <div class="sender">Chika</div>
       <div class="content">${msg.text}</div>
       <div class="time">${time}</div>
     `;
     broadcastFeed.appendChild(msgEl);
   });
   
   broadcastFeed.scrollTop = broadcastFeed.scrollHeight;
 });
}

function showMsg(text, isError = false) {
 loginMsg.textContent = text;
 loginMsg.style.color = isError ? "#ff4444" : "#44ff44";
 setTimeout(() => { loginMsg.textContent = ""; }, 3000);
}

loginBtn.onclick = async () => {
 try {
   loginBtn.disabled = true;
   const provider = new GoogleAuthProvider();
   const result = await signInWithPopup(auth, provider);
   const email = result.user.email;
   
   if (email === ADMIN_EMAIL) {
     await logAccessAttempt(email, true);
     console.log(`[AUTH] ✓ Access granted to ${email}`);
   } else {
     await logAccessAttempt(email, false);
     await signOut(auth);
     showMsg(`Akses ditolak. Email ${email} tidak authorized`, true);
     console.log(`[AUTH] ✗ Access denied for ${email}`);
     loginBtn.disabled = false;
   }
 } catch (err) {
   showMsg(`Login gagal: ${err.message}`, true);
   console.error("Login error:", err);
   loginBtn.disabled = false;
 }
};

logoutBtn.onclick = async () => {
 await signOut(auth);
};

addWishBtn.onclick = async () => {
 const name = wishName.value.trim();
 if (!name) {
   alert("Nama tidak boleh kosong");
   return;
 }
 
 try {
   addWishBtn.disabled = true;
   await push(ref(db, "wishes"), {
     name: name,
     timestamp: Date.now()
   });
   wishName.value = "";
   addWishBtn.disabled = false;
 } catch (err) {
   alert("Gagal tambah wishes: " + err.message);
   addWishBtn.disabled = false;
 }
};

sendBroadcastBtn.onclick = async () => {
 const text = broadcastInput.value.trim();
 if (!text) {
   alert("Pesan tidak boleh kosong");
   return;
 }
 
 try {
   sendBroadcastBtn.disabled = true;
   await push(ref(db, "broadcasts"), {
     text: text,
     timestamp: Date.now()
   });
   broadcastInput.value = "";
   sendBroadcastBtn.disabled = false;
 } catch (err) {
   alert("Gagal kirim broadcast: " + err.message);
   sendBroadcastBtn.disabled = false;
 }
};

onAuthStateChanged(auth, async user => {
 if (user && user.email === ADMIN_EMAIL) {
   currentUser = user;
   loginScreen.classList.add("hidden");
   adminPanel.classList.remove("hidden");
   updateStats();
   loadBroadcasts();
 } else {
   currentUser = null;
   loginScreen.classList.remove("hidden");
   adminPanel.classList.add("hidden");
   loginBtn.disabled = false;
 }
});

console.log("[ADMIN] Panel loaded. Authorized email:", ADMIN_EMAIL);
</script>
</body>
</html>
