<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Execurive Arena</title>
    <style>
        /* CSS dasar untuk merapikan tampilan */
        body { 
            font-family: Arial, sans-serif; 
            text-align: center; 
            background: #1a1a1a; /* Warna gelap ala game */
            color: white; 
            margin-top: 100px; 
        }
        button { 
            padding: 12px 24px; 
            font-size: 16px; 
            cursor: pointer; 
            background: #4285F4; /* Warna biru Google */
            color: white; 
            border: none; 
            border-radius: 5px; 
            font-weight: bold;
        }
        button:hover { background: #357ae8; }
        
        /* Area info pemain disembunyikan dulu sampai pemain berhasil login */
        #player-info { margin-top: 30px; display: none; }
        #logout-btn { background: #e53935; margin-top: 20px; }
        #logout-btn:hover { background: #b71c1c; }
    </style>
</head>
<body>

    <h1>Welcome to Execurive Arena</h1>
    <p>Silakan login untuk masuk ke Lobby Server</p>

    <button id="login-btn">Login dengan Google</button>

    <div id="player-info">
        <h2>Halo, Agent <span id="player-name"></span>!</h2>
        <p>Email: <span id="player-email"></span></p>
        <p><i>Mempersiapkan data ke server Execurive...</i></p>
        <button id="logout-btn">Logout</button>
    </div>

    <script type="module">
        // 1. Mengambil alat-alat (fungsi) yang kita butuhkan dari server Firebase
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-app.js";
        import { getAuth, signInWithPopup, GoogleAuthProvider, signOut, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-auth.js";

        // 2. Kunci rahasia milik Execurive Arena
        const firebaseConfig = {
            apiKey: "AIzaSyCl4ei8kfMaBoQEokFE5FlkPvz-NdEhQXw",
            authDomain: "exeai-eefc8.firebaseapp.com",
            databaseURL: "https://exeai-eefc8-default-rtdb.asia-southeast1.firebasedatabase.app",
            projectId: "exeai-eefc8",
            storageBucket: "exeai-eefc8.firebasestorage.app",
            messagingSenderId: "1013428002517",
            appId: "1:1013428002517:web:6e3e07a810167c97bb8c5c",
            measurementId: "G-D48XD4ZT6Q"
        };

        // 3. Menghidupkan Firebase di web ini
        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const provider = new GoogleAuthProvider();

        // 4. Mencari tombol dan teks di HTML agar bisa dikendalikan oleh JavaScript
        const loginBtn = document.getElementById("login-btn");
        const logoutBtn = document.getElementById("logout-btn");
        const playerInfo = document.getElementById("player-info");
        const playerName = document.getElementById("player-name");
        const playerEmail = document.getElementById("player-email");

        // 5. Perintah saat tombol Login diklik
        loginBtn.addEventListener("click", () => {
            // signInWithPopup memunculkan jendela kecil (popup) akun Google
            signInWithPopup(auth, provider)
                .then((result) => {
                    console.log("Login sukses!");
                })
                .catch((error) => {
                    alert("Gagal login: " + error.message);
                });
        });

        // 6. Perintah saat tombol Logout diklik
        logoutBtn.addEventListener("click", () => {
            signOut(auth);
        });

        // 7. Pengawas Status (Memantau apakah ada yang sedang login atau tidak)
        onAuthStateChanged(auth, (user) => {
            if (user) {
                // Jika ADA user yang login: sembunyikan tombol login, tampilkan info
                loginBtn.style.display = "none";
                playerInfo.style.display = "block";
                playerName.innerText = user.displayName; // Mengambil nama dari Google
                playerEmail.innerText = user.email;      // Mengambil email dari Google
            } else {
                // Jika TIDAK ADA user: tampilkan tombol login, sembunyikan info
                loginBtn.style.display = "inline-block";
                playerInfo.style.display = "none";
            }
        });
    </script>
</body>
</html>
