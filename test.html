<script>
async function convert(type) {
  const url = document.getElementById("url").value;
  const result = document.getElementById("result");

  if (!url) {
    result.innerHTML = "Masukkan link dulu!";
    return;
  }

  result.innerHTML = "Processing... ⏳";

  try {
    const response = await fetch(
      "https://youtube-mp36.p.rapidapi.com/dl?url=" + encodeURIComponent(url),
      {
        method: "GET",
        headers: {
          "x-rapidapi-key": "7b17bf3ab4mshb72cf086f868e75p1087cejsnb980948f364d",
          "x-rapidapi-host": "youtube-mp36.p.rapidapi.com"
        }
      }
    );

    const data = await response.json();

    if (data.link) {
      result.innerHTML = `
        <p>${data.title}</p>
        <a href="${data.link}" target="_blank">Download MP3</a>
      `;
    } else {
      result.innerHTML = "Gagal convert ❌";
    }

  } catch (err) {
    result.innerHTML = "Server error ❌";
  }
}
</script>
