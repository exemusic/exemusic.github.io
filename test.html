<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hexky AI - YT Downloader</title>
    <style>
        body {
            background: #0f0f0f;
            color: #00d4ff;
            font-family: 'Courier New', monospace;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }
        .box {
            background: #1a1a1a;
            padding: 25px;
            border: 2px solid #00d4ff;
            border-radius: 10px;
            text-align: center;
            width: 90%;
            max-width: 400px;
            box-shadow: 0 0 15px rgba(0, 212, 255, 0.3);
        }
        input {
            width: 100%;
            padding: 10px;
            margin: 15px 0;
            background: #222;
            border: 1px solid #444;
            color: #fff;
            border-radius: 5px;
            box-sizing: border-box;
        }
        button {
            background: #00d4ff;
            color: #000;
            border: none;
            padding: 10px 20px;
            font-weight: bold;
            cursor: pointer;
            width: 100%;
            border-radius: 5px;
        }
        button:hover { background: #0099cc; }
        #downloadResult { margin-top: 20px; }
    </style>
</head>
<body>

<div class="box">
    <h3>HEXKY AI CONVERTER</h3>
    <p style="font-size: 10px; color: #888;">Admin Execurive Roleplay</p>
    <input type="text" id="videoLink" placeholder="Masukkan link YouTube...">
    <button onclick="unduh()">GENERATE LINK</button>

    <div id="downloadResult"></div>
</div>

<script>
    function unduh() {
        let url = document.getElementById('videoLink').value;
        let result = document.getElementById('downloadResult');

        if (!url) {
            alert("Hexky, linknya jangan kosong!");
            return;
        }

        // Ambil ID Video
        let videoId = "";
        if (url.includes("v=")) {
            videoId = url.split("v=")[1].split("&")[0];
        } else if (url.includes("youtu.be/")) {
            videoId = url.split("youtu.be/")[1].split("?")[0];
        } else {
            videoId = url; // Asumsi user masukkan ID langsung
        }

        // Pakai widget loader agar tidak kena blokir GitHub
        result.innerHTML = `
            <p style="color:#888; font-size:12px;">Klik tombol di bawah untuk download:</p>
            <iframe 
                src="https://api.vevioz.com/apis/button/mp3?url=https://www.youtube.com/watch?v=${videoId}" 
                width="100%" 
                height="70px" 
                scrolling="no" 
                style="border:none;">
            </iframe>
        `;
    }
</script>

</body>
</html>
