<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<title>Internet Speed Test</title>

<style>
body{
  background:#0b0f1a;
  color:white;
  font-family:Arial;
  text-align:center;
  padding-top:100px;
}

button{
  padding:15px 40px;
  font-size:18px;
  border:none;
  border-radius:10px;
  background:#00f5ff;
  cursor:pointer;
}

.result{
  font-size:30px;
  margin-top:30px;
}
</style>
</head>

<body>

<h1>Speed Test</h1>

<button onclick="testSpeed()">Start Test</button>

<div class="result" id="ping">Ping: -</div>
<div class="result" id="download">Download: -</div>
<div class="result" id="upload">Upload: -</div>

<script>
async function testSpeed(){

document.getElementById("ping").innerHTML="Ping: testing...";
document.getElementById("download").innerHTML="Download: testing...";
document.getElementById("upload").innerHTML="Upload: testing...";

// ping test
let start=performance.now();
await fetch("https://librespeed.org/backend/empty.php");
let ping=Math.round(performance.now()-start);

document.getElementById("ping").innerHTML="Ping: "+ping+" ms";

// download test
let t1=performance.now();
let r=await fetch("https://librespeed.org/backend/garbage.php?r="+Math.random());
let b=await r.blob();
let t2=performance.now();

let speed=(b.size*8)/((t2-t1)/1000)/1000000;

document.getElementById("download").innerHTML="Download: "+speed.toFixed(2)+" Mbps";

// upload test
let data=new Blob([new Uint8Array(5*1024*1024)]);

let t3=performance.now();
await fetch("https://librespeed.org/backend/empty.php",{
method:"POST",
body:data
});
let t4=performance.now();

let up=(data.size*8)/((t4-t3)/1000)/1000000;

document.getElementById("upload").innerHTML="Upload: "+up.toFixed(2)+" Mbps";

}
</script>

</body>
</html>
