<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>EXECURIVE ARENA - Auto Lock Update</title>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root { --neon-blue: #00f3ff; --neon-pink: #ff00ff; --neon-red: #ff3131; }
        * { box-sizing: border-box; touch-action: none; user-select: none; }
        body { margin: 0; background: #000; overflow: hidden; font-family: 'Orbitron', sans-serif; width: 100vw; height: 100vh; }
        .overlay { position: fixed; inset: 0; z-index: 100; background: rgba(0,0,0,0.9); display: flex; flex-direction: column; justify-content: center; align-items: center; color: white; }
        #game-canvas { display: block; background: #050505; }
        
        /* Kontrol */
        #joystick-container { position: absolute; bottom: 50px; left: 50px; width: 120px; height: 120px; background: rgba(255, 255, 255, 0.05); border: 2px solid var(--neon-blue); border-radius: 50%; display: none; }
        #joystick-stick { position: absolute; top: 50%; left: 50%; width: 50px; height: 50px; background: var(--neon-blue); border-radius: 50%; transform: translate(-50%, -50%); box-shadow: 0 0 15px var(--neon-blue); }
        #fire-btn { position: absolute; bottom: 60px; right: 50px; width: 100px; height: 100px; background: radial-gradient(circle, rgba(255, 0, 255, 0.4), rgba(255, 0, 255, 0.05)); border: 4px solid var(--neon-pink); border-radius: 50%; display: none; justify-content: center; align-items: center; color: white; font-weight: bold; box-shadow: 0 0 20px rgba(255, 0, 255, 0.3); cursor: pointer; transition: 0.1s; }
        #fire-btn:active { transform: scale(0.8); background: rgba(255, 0, 255, 0.6); }
        .btn-main { padding: 15px 40px; background: var(--neon-blue); border: none; font-family: 'Orbitron'; font-weight: bold; cursor: pointer; margin-top: 20px; border-radius: 5px; }
    </style>
</head>
<body>

    <div id="ui-auth" class="overlay">
        <h1>EXECURIVE ARENA</h1>
        <button class="btn-main" id="login-btn">AUTH LOGIN</button>
    </div>

    <div id="ui-lobby" class="overlay" style="display:none">
        <h2>LOBBY SERVER</h2>
        <div id="player-list" style="margin: 20px 0;"></div>
        <button class="btn-main" style="background:var(--neon-pink)" id="start-btn">DEPLOY</button>
    </div>

    <div id="joystick-container"><div id="joystick-stick"></div></div>
    <div id="fire-btn">FIRE</div>

    <canvas id="game-canvas"></canvas>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-app.js";
        import { getAuth, signInWithPopup, GoogleAuthProvider, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-auth.js";
        import { getDatabase, ref, set, onValue, onDisconnect, update } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-database.js";

        const firebaseConfig = {
            apiKey: "AIzaSyCl4ei8kfMaBoQEokFE5FlkPvz-NdEhQXw",
            authDomain: "exeai-eefc8.firebaseapp.com",
            databaseURL: "https://exeai-eefc8-default-rtdb.asia-southeast1.firebasedatabase.app",
            projectId: "exeai-eefc8",
            storageBucket: "exeai-eefc8.firebasestorage.app",
            messagingSenderId: "1013428002517",
            appId: "1:1013428002517:web:6e3e07a810167c97bb8c5c"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getDatabase(app);
        const provider = new GoogleAuthProvider();

        const canvas = document.getElementById("game-canvas");
        const ctx = canvas.getContext("2d");
        
        let myId = null;
        let players = {};
        let bullets = [];
        let hitEffects = []; // Efek api saat kena
        let joystick = { active: false, moveX: 0, moveY: 0 };
        let keys = {};
        let lastFireTime = 0;
        const FIRE_RANGE = 300; // Jarak area auto-lock

        function resize() { canvas.width = window.innerWidth; canvas.height = window.innerHeight; }
        window.addEventListener('resize', resize);
        resize();

        onAuthStateChanged(auth, (user) => {
            if (user) {
                myId = user.uid;
                document.getElementById("ui-auth").style.display = "none";
                document.getElementById("ui-lobby").style.display = "flex";
                set(ref(db, 'players/' + myId), { id: myId, name: user.displayName, x: 300, y: 300, color: '#00f3ff', hp: 100 });
                onDisconnect(ref(db, 'players/' + myId)).remove();
            }
        });

        onValue(ref(db, 'players'), (snap) => { players = snap.val() || {}; });

        // Input Keyboard
        window.addEventListener("keydown", e => keys[e.key.toLowerCase()] = true);
        window.addEventListener("keyup", e => keys[e.key.toLowerCase()] = false);

        // Logic Analog
        const jContainer = document.getElementById("joystick-container");
        const jStick = document.getElementById("joystick-stick");
        jContainer.addEventListener("touchstart", () => joystick.active = true);
        window.addEventListener("touchmove", (e) => {
            if (!joystick.active) return;
            const touch = e.touches[0];
            const rect = jContainer.getBoundingClientRect();
            const dx = touch.clientX - (rect.left + 60);
            const dy = touch.clientY - (rect.top + 60);
            const dist = Math.hypot(dx, dy);
            const max = 60;
            const ratio = dist > max ? max / dist : 1;
            joystick.moveX = (dx * ratio) / max;
            joystick.moveY = (dy * ratio) / max;
            jStick.style.transform = `translate(calc(-50% + ${dx*ratio}px), calc(-50% + ${dy*ratio}px))`;
        });
        window.addEventListener("touchend", () => { joystick.active = false; joystick.moveX = 0; joystick.moveY = 0; jStick.style.transform = `translate(-50%, -50%)`; });

        // LOGIKA AUTO-TARGET & FIRE
        function fire() {
            const now = Date.now();
            if (now - lastFireTime < 1000 || !myId || !players[myId]) return;

            const me = players[myId];
            let nearestEnemy = null;
            let minDist = FIRE_RANGE;

            // Cari musuh terdekat dalam range
            Object.values(players).forEach(p => {
                if (p.id !== myId) {
                    const d = Math.hypot(p.x - me.x, p.y - me.y);
                    if (d < minDist) {
                        minDist = d;
                        nearestEnemy = p;
                    }
                }
            });

            // Hanya tembak jika ada musuh di dalam area lingkaran
            if (nearestEnemy) {
                const angle = Math.atan2(nearestEnemy.y - me.y, nearestEnemy.x - me.x);
                bullets.push({
                    x: me.x, y: me.y,
                    vx: Math.cos(angle) * 15,
                    vy: Math.sin(angle) * 15,
                    owner: myId,
                    targetId: nearestEnemy.id,
                    life: 60
                });
                lastFireTime = now;
            }
        }

        document.getElementById("fire-btn").addEventListener("touchstart", (e) => { e.preventDefault(); fire(); });
        window.addEventListener("mousedown", () => { if(canvas.style.display === "block") fire(); });

        function loop() {
            if (myId && players[myId]) {
                let me = players[myId];
                let moved = false;
                if (keys['w']) { me.y -= 5; moved = true; }
                if (keys['s']) { me.y += 5; moved = true; }
                if (keys['a']) { me.x -= 5; moved = true; }
                if (keys['d']) { me.x += 5; moved = true; }
                if (joystick.active) { me.x += joystick.moveX * 5; me.y += joystick.moveY * 5; moved = true; }
                if (moved) update(ref(db, 'players/' + myId), { x: me.x, y: me.y });
            }

            // Update Bullets & Damage
            bullets.forEach((b, i) => {
                b.x += b.vx; b.y += b.vy;
                b.life--;
                
                Object.values(players).forEach(p => {
                    if (p.id !== b.owner && Math.hypot(p.x - b.x, p.y - b.y) < 25) {
                        // HIT! Update HP Musuh (Hanya pengirim tembakan yang update ke firebase untuk efisiensi)
                        const newHp = Math.max(0, p.hp - 32);
                        update(ref(db, 'players/' + p.id), { hp: newHp });
                        
                        // Tambah Efek Ledakan Api di Musuh
                        hitEffects.push({ x: p.x, y: p.y, life: 20, color: '#ff4500' });
                        bullets.splice(i, 1);
                    }
                });
                if (b.life <= 0) bullets.splice(i, 1);
            });

            // Update Visual Hit Effects
            hitEffects.forEach((ef, i) => { ef.life--; if(ef.life <= 0) hitEffects.splice(i, 1); });

            // DRAWING
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            
            if (myId && players[myId]) {
                // 1. Gambar Area Auto-Lock (Lingkaran Putih Transparan)
                ctx.beginPath();
                ctx.arc(players[myId].x, players[myId].y, FIRE_RANGE, 0, Math.PI*2);
                ctx.strokeStyle = "rgba(255, 255, 255, 0.1)";
                ctx.setLineDash([10, 10]); // Garis putus-putus
                ctx.stroke();
                ctx.setLineDash([]);
            }

            // 2. Gambar Efek Ledakan (Api)
            hitEffects.forEach(ef => {
                ctx.fillStyle = ef.color;
                ctx.beginPath();
                ctx.arc(ef.x, ef.y, 25 - ef.life, 0, Math.PI*2);
                ctx.fill();
            });

            // 3. Gambar Player & Health
            Object.values(players).forEach(p => {
                // Health Bar
                ctx.fillStyle = "#222"; ctx.fillRect(p.x - 25, p.y - 45, 50, 6);
                ctx.fillStyle = p.hp > 30 ? "#00f3ff" : "#ff3131";
                ctx.fillRect(p.x - 25, p.y - 45, (p.hp/100) * 50, 6);

                // Body
                ctx.shadowBlur = 15; ctx.shadowColor = p.color;
                ctx.fillStyle = p.color;
                ctx.fillRect(p.x - 15, p.y - 15, 30, 30);
                
                // Name
                ctx.shadowBlur = 0; ctx.fillStyle = "white"; ctx.font = "bold 12px Orbitron";
                ctx.fillText(p.name, p.x - 25, p.y - 55);
            });

            // 4. Gambar Peluru
            bullets.forEach(b => {
                ctx.fillStyle = "#ffff00"; ctx.beginPath();
                ctx.arc(b.x, b.y, 5, 0, Math.PI*2); ctx.fill();
            });

            requestAnimationFrame(loop);
        }

        document.getElementById("start-btn").onclick = () => {
            document.getElementById("ui-lobby").style.display = "none";
            document.getElementById("joystick-container").style.display = "block";
            document.getElementById("fire-btn").style.display = "flex";
            canvas.style.display = "block";
            loop();
        };
        document.getElementById("login-btn").onclick = () => signInWithPopup(auth, provider);
    </script>
</body>
</html>
