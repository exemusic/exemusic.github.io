<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>ExeMusic YT Player</title>

<style>

body{
background:#0f0f0f;
font-family:Arial;
color:white;
display:flex;
align-items:center;
justify-content:center;
height:100vh;
margin:0;
}

.box{
background:#1c1c1c;
padding:30px;
border-radius:15px;
width:420px;
text-align:center;
}

input{
width:100%;
padding:12px;
border:none;
border-radius:8px;
background:#2b2b2b;
color:white;
margin-bottom:10px;
}

button{
width:100%;
padding:12px;
border:none;
border-radius:8px;
background:#ff0033;
color:white;
cursor:pointer;
}

audio{
margin-top:20px;
width:100%;
}

</style>
</head>

<body>

<div class="box">

<h2>ExeMusic YouTube Audio</h2>

<input id="yt" placeholder="Paste YouTube Link">

<button onclick="playAudio()">Play</button>

<audio id="player" controls></audio>

</div>

<script>

function getID(url){

let regExp = /(?:youtube\.com.*(?:\?|&)v=|youtu\.be\/)([^&#]+)/;
let match = url.match(regExp);

return match ? match[1] : null;

}

async function playAudio(){

let url = document.getElementById("yt").value
let id = getID(url)

if(!id){
alert("Link tidak valid")
return
}

let api = "https://pipedapi.kavin.rocks/streams/" + id

let res = await fetch(api)
let data = await res.json()

let audio = data.audioStreams[0].url

let player = document.getElementById("player")

player.src = audio
player.play()

}

</script>

</body>
</html>
