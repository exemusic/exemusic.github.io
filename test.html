<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <title>YT to MP3/MP4 by Hengki</title>
  <style>
    body {
      font-family: Arial;
      background: #0f172a;
      color: white;
      text-align: center;
      padding-top: 100px;
    }
    input {
      padding: 10px;
      width: 300px;
      border-radius: 8px;
      border: none;
    }
    button {
      padding: 10px;
      margin: 10px;
      border-radius: 8px;
      border: none;
      cursor: pointer;
    }
    .mp3 { background: #22c55e; }
    .mp4 { background: #3b82f6; }
  </style>
</head>
<body>

  <h2>YT to MP3/MP4<br>by Hengki</h2>

  <input type="text" id="url" placeholder="Masukkan link YouTube...">
  <br>

  <button class="mp3" onclick="goMP3()">MP3</button>
  <button class="mp4" onclick="goMP4()">MP4</button>

  <script>
    function goMP3() {
      const url = document.getElementById('url').value;
      if (!url) return alert("Masukkan link dulu!");

      window.open("https://www.y2mate.is/en/youtube-mp3?url=" + encodeURIComponent(url), "_blank");
    }

    function goMP4() {
      const url = document.getElementById('url').value;
      if (!url) return alert("Masukkan link dulu!");

      window.open("https://en.savefrom.net/1-youtube-video-downloader/?url=" + encodeURIComponent(url), "_blank");
    }
  </script>

</body>
</html>
