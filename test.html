<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>EXECURIVE ARENA - Combat Update</title>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root { --neon-blue: #00f3ff; --neon-pink: #ff00ff; --neon-red: #ff3131; }
        * { 
            box-sizing: border-box; touch-action: none; 
            user-select: none; -webkit-user-select: none; /* Anti select text saat spam */
        }
        
        body { 
            margin: 0; padding: 0; background: #000; 
            overflow: hidden; font-family: 'Orbitron', sans-serif; 
            width: 100vw; height: 100vh;
        }

        .overlay {
            position: fixed; inset: 0; z-index: 100;
            background: rgba(0,0,0,0.9);
            display: flex; flex-direction: column;
            justify-content: center; align-items: center; color: white;
        }

        #game-canvas { display: block; background: #050505; }

        /* UI Kontrol */
        #joystick-container {
            position: absolute; bottom: 50px; left: 50px;
            width: 120px; height: 120px;
            background: rgba(255, 255, 255, 0.1);
            border: 2px solid var(--neon-blue); border-radius: 50%;
            display: none;
        }
        #joystick-stick {
            position: absolute; top: 50%; left: 50%;
            width: 50px; height: 50px;
            background: var(--neon-blue); border-radius: 50%;
            transform: translate(-50%, -50%);
            box-shadow: 0 0 15px var(--neon-blue);
        }

        /* Tombol Tembak Ala ML */
        #fire-btn {
            position: absolute; bottom: 60px; right: 50px;
            width: 90px; height: 90px;
            background: radial-gradient(circle, rgba(255, 0, 255, 0.6) 0%, rgba(255, 0, 255, 0.1) 100%);
            border: 4px solid var(--neon-pink); border-radius: 50%;
            display: none; justify-content: center; align-items: center;
            color: white; font-weight: bold; font-size: 14px;
            box-shadow: 0 0 20px rgba(255, 0, 255, 0.4);
            cursor: pointer; transition: transform 0.1s, box-shadow 0.1s;
        }
        #fire-btn:active {
            transform: scale(0.85); /* Animasi Klik */
            box-shadow: 0 0 35px var(--neon-pink);
            background: rgba(255, 0, 255, 0.8);
        }

        .btn-main {
            padding: 15px 40px; background: var(--neon-blue);
            border: none; font-family: 'Orbitron'; font-weight: bold;
            cursor: pointer; margin-top: 20px; border-radius: 5px;
        }
    </style>
</head>
<body>

    <div id="ui-auth" class="overlay">
        <h1>EXECURIVE ARENA</h1>
        <button class="btn-main" id="login-btn">AUTH LOGIN</button>
    </div>

    <div id="ui-lobby" class="overlay" style="display:none">
        <h2>LOBBY SERVER</h2>
        <div id="player-list" style="margin: 20px 0;"></div>
        <button class="btn-main" style="background:var(--neon-pink)" id="start-btn">DEPLOY</button>
    </div>

    <div id="joystick-container"><div id="joystick-stick"></div></div>
    <div id="fire-btn">FIRE</div>

    <canvas id="game-canvas"></canvas>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-app.js";
        import { getAuth, signInWithPopup, GoogleAuthProvider, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-auth.js";
        import { getDatabase, ref, set, onValue, onDisconnect, update } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-database.js";

        const firebaseConfig = {
            apiKey: "AIzaSyCl4ei8kfMaBoQEokFE5FlkPvz-NdEhQXw",
            authDomain: "exeai-eefc8.firebaseapp.com",
            databaseURL: "https://exeai-eefc8-default-rtdb.asia-southeast1.firebasedatabase.app",
            projectId: "exeai-eefc8",
            storageBucket: "exeai-eefc8.firebasestorage.app",
            messagingSenderId: "1013428002517",
            appId: "1:1013428002517:web:6e3e07a810167c97bb8c5c"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getDatabase(app);
        const provider = new GoogleAuthProvider();

        const canvas = document.getElementById("game-canvas");
        const ctx = canvas.getContext("2d");
        
        let myId = null;
        let players = {};
        let bullets = [];
        let joystick = { active: false, moveX: 0, moveY: 0 };
        let keys = {}; // Untuk PC WASD
        let lastFireTime = 0; // Untuk jeda tembak 1 detik

        function resize() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
        }
        window.addEventListener('resize', resize);
        resize();

        // 1. AUTH LOGIC
        onAuthStateChanged(auth, (user) => {
            if (user) {
                myId = user.uid;
                document.getElementById("ui-auth").style.display = "none";
                document.getElementById("ui-lobby").style.display = "flex";
                
                const pRef = ref(db, 'players/' + myId);
                set(pRef, { 
                    id: myId, 
                    name: user.displayName, 
                    x: Math.random() * 500, 
                    y: Math.random() * 500, 
                    color: '#00f3ff',
                    hp: 100 // Health awal
                });
                onDisconnect(pRef).remove();
            }
        });

        onValue(ref(db, 'players'), (snap) => {
            players = snap.val() || {};
            document.getElementById("player-list").innerHTML = Object.values(players).map(p => `<div>${p.name} (HP: ${p.hp})</div>`).join("");
        });

        // 2. INPUT HANDLER (PC & Mobile)
        window.addEventListener("keydown", e => keys[e.key.toLowerCase()] = true);
        window.addEventListener("keyup", e => keys[e.key.toLowerCase()] = false);

        const jContainer = document.getElementById("joystick-container");
        const jStick = document.getElementById("joystick-stick");

        jContainer.addEventListener("touchstart", (e) => { joystick.active = true; });
        window.addEventListener("touchmove", (e) => {
            if (!joystick.active) return;
            const touch = Array.from(e.touches).find(t => t.target.closest('#joystick-container') || joystick.active);
            if(!touch) return;
            const rect = jContainer.getBoundingClientRect();
            const centerX = rect.left + rect.width / 2;
            const centerY = rect.top + rect.height / 2;
            let dx = touch.clientX - centerX;
            let dy = touch.clientY - centerY;
            const dist = Math.sqrt(dx*dx + dy*dy);
            const maxDist = rect.width / 2;
            if (dist > maxDist) { dx *= maxDist / dist; dy *= maxDist / dist; }
            jStick.style.transform = `translate(calc(-50% + ${dx}px), calc(-50% + ${dy}px))`;
            joystick.moveX = dx / maxDist; joystick.moveY = dy / maxDist;
        });
        window.addEventListener("touchend", () => {
            joystick.active = false; joystick.moveX = 0; joystick.moveY = 0;
            jStick.style.transform = `translate(-50%, -50%)`;
        });

        // 3. SHOOTING LOGIC
        function fire() {
            const now = Date.now();
            if (now - lastFireTime < 1000) return; // Jeda 1 detik
            if (!myId || !players[myId]) return;

            const me = players[myId];
            bullets.push({
                x: me.x, y: me.y,
                vx: 10, vy: 0, // Sementara tembak ke kanan (bisa dikembangkan arahnya)
                owner: myId,
                life: 100
            });
            lastFireTime = now;
            
            // Visual feedback: Recoil kecil pada kotak
            me.x -= 5;
        }

        document.getElementById("fire-btn").addEventListener("touchstart", (e) => {
            e.preventDefault();
            fire();
        });
        window.addEventListener("mousedown", (e) => {
            if(canvas.style.display === "block") fire();
        });

        // 4. GAME LOOP
        function loop() {
            if (myId && players[myId]) {
                let me = players[myId];
                let moved = false;
                const speed = 5;

                // Gabungan WASD + Analog
                if (keys['w']) { me.y -= speed; moved = true; }
                if (keys['s']) { me.y += speed; moved = true; }
                if (keys['a']) { me.x -= speed; moved = true; }
                if (keys['d']) { me.x += speed; moved = true; }
                
                if (joystick.active) {
                    me.x += joystick.moveX * speed;
                    me.y += joystick.moveY * speed;
                    moved = true;
                }

                if (moved) update(ref(db, 'players/' + myId), { x: me.x, y: me.y });
            }

            // Update Bullets & Collision
            bullets.forEach((b, i) => {
                b.x += b.vx;
                b.life--;
                
                // Cek Tabrakan dengan Pemain Lain
                Object.values(players).forEach(p => {
                    if (p.id !== b.owner) {
                        const dist = Math.hypot(p.x - b.x, p.y - b.y);
                        if (dist < 25) { // Jika kena kotak
                            if (p.id === myId) { // Jika KITA yang kena
                                const newHp = Math.max(0, p.hp - 32);
                                update(ref(db, 'players/' + myId), { hp: newHp });
                            }
                            bullets.splice(i, 1);
                        }
                    }
                });
                if (b.life <= 0) bullets.splice(i, 1);
            });

            // DRAWING
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            Object.values(players).forEach(p => {
                // Gambar Health Bar
                const barW = 50;
                ctx.fillStyle = "#333";
                ctx.fillRect(p.x - barW/2, p.y - 40, barW, 6);
                ctx.fillStyle = p.hp > 30 ? "#4caf50" : "#ff3131"; // Hijau jika sehat, merah jika kritis
                ctx.fillRect(p.x - barW/2, p.y - 40, (p.hp/100) * barW, 6);

                // Gambar Pemain
                ctx.shadowBlur = 15; ctx.shadowColor = p.color;
                ctx.fillStyle = p.color;
                ctx.fillRect(p.x - 15, p.y - 15, 30, 30);
                
                ctx.shadowBlur = 0;
                ctx.fillStyle = "white";
                ctx.font = "10px Orbitron";
                ctx.fillText(p.name, p.x - 20, p.y - 45);
            });

            // Gambar Bullets
            bullets.forEach(b => {
                ctx.fillStyle = "yellow";
                ctx.beginPath();
                ctx.arc(b.x, b.y, 4, 0, Math.PI*2);
                ctx.fill();
            });

            requestAnimationFrame(loop);
        }

        document.getElementById("start-btn").onclick = () => {
            document.getElementById("ui-lobby").style.display = "none";
            jContainer.style.display = "block";
            document.getElementById("fire-btn").style.display = "flex";
            canvas.style.display = "block";
            loop();
        };

        document.getElementById("login-btn").onclick = () => signInWithPopup(auth, provider);

    </script>
</body>
</html>
