<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hexky AI - YT to MP3</title>
    <style>
        body {
            background-color: #0d1117; /* Warna gelap GitHub */
            color: #58a6ff;
            font-family: 'Segoe UI', sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }
        .card {
            background: #161b22;
            padding: 30px;
            border-radius: 12px;
            border: 1px solid #30363d;
            text-align: center;
            width: 350px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.5);
        }
        h2 { color: #ffffff; margin-bottom: 5px; }
        .role { font-size: 12px; color: #8b949e; margin-bottom: 20px; }
        input {
            width: 100%;
            padding: 12px;
            background: #0d1117;
            border: 1px solid #30363d;
            border-radius: 6px;
            color: white;
            box-sizing: border-box;
            margin-bottom: 15px;
        }
        button {
            background-color: #238636; /* Warna hijau tombol GitHub */
            color: white;
            border: none;
            padding: 12px;
            width: 100%;
            border-radius: 6px;
            font-weight: bold;
            cursor: pointer;
            transition: 0.2s;
        }
        button:hover { background-color: #2ea043; }
        .note { font-size: 11px; color: #8b949e; margin-top: 15px; }
    </style>
</head>
<body>

<div class="card">
    <h2>YT to MP3</h2>
    <div class="role">Admin Execurive Roleplay Tool</div>
    
    <input type="text" id="youtubeUrl" placeholder="Tempel link YouTube di sini...">
    <button onclick="downloadSekarang()">DOWNLOAD MP3</button>

    <p class="note">Akan dialihkan ke halaman download aman.</p>
</div>

<script>
    function downloadSekarang() {
        const inputUrl = document.getElementById('youtubeUrl').value;
        
        if (!inputUrl) {
            alert("Hexky, linknya diisi dulu ya!");
            return;
        }

        // Membersihkan URL agar hanya mengambil ID Video
        let videoId = "";
        if (inputUrl.includes("v=")) {
            videoId = inputUrl.split("v=")[1].split("&")[0];
        } else if (inputUrl.includes("youtu.be/")) {
            videoId = inputUrl.split("youtu.be/")[1].split("?")[0];
        } else {
            videoId = inputUrl;
        }

        // Menggunakan sistem redirect (buka tab baru)
        // Ini cara paling ampuh agar tidak diblokir GitHub atau Chrome
        const downloadUrl = `https://api.vevioz.com/apis/button/mp3?url=https://www.youtube.com/watch?v=${videoId}`;
        
        window.open(downloadUrl, '_blank');
    }
</script>

</body>
</html>
