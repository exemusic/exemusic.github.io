<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Chika.R.V • Turns 21</title>
<meta name="theme-color" content="#ff6cab">
<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:Inter,Arial,sans-serif}
body{min-height:100vh;background:linear-gradient(180deg,#fff5f8,#ffe6f1);color:#5a4450;overflow-x:hidden}
.bg span{position:fixed;font-size:120px;opacity:.07;pointer-events:none;animation:f 8s ease-in-out infinite}
.bg span:nth-child(1){left:5%;top:5%}.bg span:nth-child(2){right:5%;top:15%}.bg span:nth-child(3){left:10%;bottom:10%}.bg span:nth-child(4){right:10%;bottom:10%}
@keyframes f{50%{transform:translateY(-20px)}}
.wrap{max-width:1000px;margin:auto;padding:20px}
.hero{text-align:center;padding-top:60px}
.hero h1{font-size:clamp(3rem,10vw,5.5rem);color:#ff5fa2}
.timer{display:inline-block;margin-top:20px;background:#fff;padding:18px 28px;border-radius:999px;box-shadow:0 10px 25px rgba(255,95,162,.15);font-size:clamp(1.4rem,6vw,3rem);font-weight:800}
.btn{margin-top:24px;border:none;background:linear-gradient(135deg,#ff83bc,#ff5fa2);color:#fff;padding:16px 28px;border-radius:999px;font-weight:800;cursor:pointer}
.stats{text-align:center;margin:18px 0}
.grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(230px,1fr));gap:14px}
.card{background:#fff;border-radius:20px;padding:14px;box-shadow:0 8px 20px rgba(0,0,0,.05)}
.row{display:flex;gap:10px;align-items:center}
.avatar{width:42px;height:42px;border-radius:50%;background:#ffd2e4;display:flex;align-items:center;justify-content:center;font-weight:700}
.modal{position:fixed;inset:0;background:rgba(0,0,0,.35);display:none;align-items:center;justify-content:center;padding:20px}
.panel{background:#fff;border-radius:24px;padding:22px;width:min(400px,100%)}
input{width:100%;padding:14px;border:2px solid #ffd6e8;border-radius:14px;margin:12px 0}
.send{width:100%;padding:14px;border:none;border-radius:14px;background:#ff5fa2;color:#fff;font-weight:700}
.more-wrap{text-align:center;margin:12px 0}
.toast{position:fixed;top:20px;left:50%;transform:translateX(-50%);background:#fff;padding:12px 18px;border-radius:14px;display:none;box-shadow:0 10px 25px rgba(0,0,0,.12)}
</style>
</head>
<body>
<div class="bg"><span>🧸</span><span>🎀</span><span>💖</span><span>✨</span></div>

<div class="wrap">
<div class="hero">
<div style="font-size:60px">🧸</div>
<h1>CHIKA.R.V</h1>
<p>turns 21 in...</p>
<div class="timer" id="timer">00 : 00 : 00 : 00</div><br>
<button class="btn" id="wishBtn">💌 Send Wishes</button>
</div>

<div class="stats"><span id="count">0</span> Wishes Sent</div>
<div class="grid" id="list"></div>
<div class="stats"><small id="showing">Showing 0 / 0</small></div>
<div class="more-wrap"><button class="btn" id="loadMoreBtn" style="display:none">Load More</button></div>
</div>

<div class="modal" id="modal">
 <div class="panel">
  <h2>🎀 Birthday Wish</h2>
  <input id="name" maxlength="30" placeholder="Your name...">
  <button class="send" id="sendBtn">Send Wishes ✨</button>
 </div>
</div>

<div class="toast" id="toast">Thank you 💖</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/12.0.0/firebase-app.js";
import { getDatabase, ref, push, onValue } from "https://www.gstatic.com/firebasejs/12.0.0/firebase-database.js";

const firebaseConfig={
 apiKey:"AIzaSyDtt4EGfBSK8SbLbiGKnsMlSgUW7fuKN8I",
 authDomain:"countdown-52c81.firebaseapp.com",
 projectId:"countdown-52c81",
 storageBucket:"countdown-52c81.firebasestorage.app",
 messagingSenderId:"121072761781",
 appId:"1:121072761781:web:5d8092a2795d50869b37fc",
 measurementId:"G-FCR7ZQKPPJ",
 databaseURL:"https://countdown-52c81-default-rtdb.asia-southeast1.firebasedatabase.app"
};

const app=initializeApp(firebaseConfig);
const db=getDatabase(app);
const timer = document.getElementById("timer");
const wishBtn = document.getElementById("wishBtn");
const modal = document.getElementById("modal");
const sendBtn = document.getElementById("sendBtn");
const list = document.getElementById("list");
const count = document.getElementById("count");
const showing = document.getElementById("showing");
const loadMoreBtn = document.getElementById("loadMoreBtn");
const toast = document.getElementById("toast");

const target=new Date("2026-06-09T00:00:00+07:00").getTime();
setInterval(()=>{
 let d=target-Date.now(); if(d<0)d=0;
 let days=Math.floor(d/86400000);
 let hrs=Math.floor(d%86400000/3600000);
 let min=Math.floor(d%3600000/60000);
 let sec=Math.floor(d%60000/1000);
 timer.textContent=`${days} : ${hrs} : ${min} : ${sec}`;
},1000);

const COOLDOWN_MS = 86400000;
const MAX_INITIAL = 50;
const LOAD_STEP = 10;
const randomNames = [
  "Aldi","Amir","Aulia","Andi","Arya","Bayu","Bima","Cahaya","Dani","Dara",
  "Dimas","Eka","Fajar","Farhan","Gema","Hadi","Ilham","Indra","Iqbal","Jalu",
  "Jasmine","Johan","Kania","Karel","Luna","Lutfi","Maya","Mukti","Nadia","Nanda",
  "Naufal","Nina","Oki","Putri","Rafi","Rania","Rian","Rizka","Sari","Salma",
  "Salman","Sinta","Tara","Teguh","Vika","Vino","Wira","Wulan","Yusuf","Yuni",
  "Zaki","Zara","Zein","Rizal","Biru","Cinta","Dewi","Feri","Galih","Hana",
  "Kirana","Mila","Rena","Raka","Novi","Tama","Dian","Rama","Shinta","Safa"
];
let wishDisplayLimit = MAX_INITIAL;
let wishesData = [];

function pickRandomName(exclude = []) {
  const available = randomNames.filter(name => !exclude.includes(name));
  return available.length ? available[Math.floor(Math.random() * available.length)] : randomNames[Math.floor(Math.random() * randomNames.length)];
}

function randomWish() {
 return {
   name: pickRandomName(),
   timestamp: Date.now() - Math.floor(Math.random()*86400000)
 };
}

function generateFakeWishes(count) {
 const names = [...randomNames];
 for (let i = names.length - 1; i > 0; i--) {
   const j = Math.floor(Math.random() * (i + 1));
   [names[i], names[j]] = [names[j], names[i]];
 }
 return Array.from({length: count}, (_, index) => ({
   name: names[index % names.length],
   timestamp: Date.now() - Math.floor(Math.random()*86400000)
 }));
}

wishBtn.onclick = () => modal.style.display = "flex";
modal.onclick = e => { if (e.target === modal) modal.style.display = "none"; };
loadMoreBtn.onclick = () => {
 wishDisplayLimit = Math.min(wishDisplayLimit + LOAD_STEP, wishesData.length);
 renderList();
};

function createWishCard(v) {
 return `
 <div class="card">
  <div class="row">
   <div class="avatar">${(v.name||"?")[0].toUpperCase()}</div>
   <div><b>${v.name}</b><br><small>sent birthday wishes 💖</small></div>
  </div>
 </div>`;
}

function renderList() {
 const visible = wishesData.slice(0, wishDisplayLimit);
 count.textContent = wishesData.length;
 list.innerHTML = visible.map(createWishCard).join("");
 showing.textContent = `Showing ${visible.length} / ${wishesData.length}`;
 loadMoreBtn.style.display = wishesData.length > visible.length ? "inline-flex" : "none";
}

function scheduleAutoWish() {
 const delay = 300000 + Math.floor(Math.random()*300000);
 setTimeout(async () => {
   const addCount = 1 + Math.floor(Math.random()*2);
   const promises = Array.from({length: addCount}, () => push(ref(db, "wishes"), randomWish()));
   await Promise.all(promises);
   scheduleAutoWish();
 }, delay);
}

function updateCooldown() {
 const cd = Number(localStorage.getItem("wish_cd") || 0);
 if (Date.now() < cd) {
   const remaining = Math.ceil((cd - Date.now()) / 1000);
   sendBtn.textContent = `Wait ${remaining}s`;
   sendBtn.disabled = true;
   setTimeout(updateCooldown, 1000);
 } else {
   sendBtn.textContent = "Send Wishes ✨";
   sendBtn.disabled = false;
 }
}
updateCooldown();

sendBtn.onclick = async () => {
 const nameInput = document.getElementById("name");
 const n = nameInput.value.trim();
 if (!n) {
   alert("Please enter your name");
   return;
 }
 const cd = Number(localStorage.getItem("wish_cd") || 0);
 if (Date.now() < cd) {
   const remain = Math.ceil((cd - Date.now()) / 1000);
   alert(`Please wait ${remain}s before sending again.`);
   return;
 }
 try {
   sendBtn.disabled = true;
   sendBtn.textContent = "Sending...";
   await push(ref(db, "wishes"), {
     name: n,
     timestamp: Date.now()
   });
   localStorage.setItem("wish_cd", String(Date.now() + COOLDOWN_MS));
   nameInput.value = "";
   modal.style.display = "none";
   showToast();
   updateCooldown();
 } catch(err) {
   console.error(err);
   alert("Failed to send wishes. Check Firebase Rules and Console.");
 } finally {
   if (Date.now() >= Number(localStorage.getItem("wish_cd") || 0)) {
     sendBtn.disabled = false;
     sendBtn.textContent = "Send Wishes ✨";
   }
 }
};

async function handleWishes(snap) {
 const data = snap.val() || {};
 let arr = Object.values(data);
 if (!arr.length) {
   if (!localStorage.getItem("wish_seed_done")) {
     const seedCount = 40 + Math.floor(Math.random()*11);
     const seedItems = generateFakeWishes(seedCount);
     await Promise.all(seedItems.map(item => push(ref(db, "wishes"), item)));
     localStorage.setItem("wish_seed_done", "1");
     return;
   }
   arr = generateFakeWishes(40 + Math.floor(Math.random()*11));
 }
 wishesData = arr.sort((a,b) => b.timestamp - a.timestamp);
 wishDisplayLimit = Math.min(wishDisplayLimit, wishesData.length) || MAX_INITIAL;
 renderList();
}

onValue(ref(db, "wishes"), snap => {
 handleWishes(snap).catch(err => console.error(err));
});

scheduleAutoWish();
</script>
</body>
</html>
