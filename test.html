```html
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>ExeMusic Upload Player</title>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<style>

body{
background:#0f172a;
color:white;
font-family:Arial;
display:flex;
justify-content:center;
padding:40px;
}

.container{
width:500px;
background:#1e293b;
border-radius:15px;
padding:20px;
box-shadow:0 0 30px rgba(0,0,0,0.6);
}

h1{
text-align:center;
margin-bottom:20px;
}

.upload{
display:flex;
gap:10px;
margin-bottom:20px;
}

input[type=file]{
flex:1;
}

button{
background:#22c55e;
border:none;
padding:10px 15px;
border-radius:8px;
color:white;
cursor:pointer;
}

button:hover{
opacity:0.8;
}

.player{
text-align:center;
margin-top:20px;
}

.controls{
margin-top:10px;
display:flex;
justify-content:center;
gap:10px;
}

.song{
padding:8px;
border-bottom:1px solid #334155;
cursor:pointer;
}

.song:hover{
background:#334155;
}

</style>
</head>

<body>

<div class="container">

<h1>ExeMusic</h1>

<div class="upload">
<input type="file" id="fileInput" accept="audio/*">
<button onclick="upload()">Upload</button>
</div>

<div id="songs"></div>

<div class="player">

<audio id="audio"></audio>

<div class="controls">
<button onclick="prev()">Prev</button>
<button onclick="play()">Play</button>
<button onclick="pause()">Stop</button>
<button onclick="next()">Next</button>
</div>

</div>

</div>

<script>

const supabaseUrl = "https://hikzgjseckxanetyxqkc.supabase.co";
const supabaseKey = "sb_publishable_lRARo_osK1IOcIDegeW-jA_9k39aCto";

const sb = window.supabase.createClient(supabaseUrl,supabaseKey);

let playlist=[];
let currentIndex=0;

const audio=document.getElementById("audio");
const songsDiv=document.getElementById("songs");

async function loadSongs(){

const {data,error}=await sb.storage.from("music").list();

songsDiv.innerHTML="";
playlist=[];

data.forEach((file,i)=>{

const url=supabaseUrl+"/storage/v1/object/public/music/"+file.name;

playlist.push(url);

const div=document.createElement("div");
div.className="song";
div.innerText=file.name;

div.onclick=()=>{
currentIndex=i;
play();
};

songsDiv.appendChild(div);

});

}

async function upload(){

const file=document.getElementById("fileInput").files[0];

if(!file){
alert("Pilih file dulu");
return;
}

const fileName=Date.now()+"_"+file.name.replace(/[^a-zA-Z0-9.]/g,"_");

const {error}=await sb.storage
.from("music")
.upload(fileName,file);

if(error){
alert("Upload gagal");
console.log(error);
return;
}

loadSongs();

}

function play(){
audio.src=playlist[currentIndex];
audio.play();
}

function pause(){
audio.pause();
}

function next(){
currentIndex++;
if(currentIndex>=playlist.length) currentIndex=0;
play();
}

function prev(){
currentIndex--;
if(currentIndex<0) currentIndex=playlist.length-1;
play();
}

loadSongs();

</script>

</body>
</html>
```
